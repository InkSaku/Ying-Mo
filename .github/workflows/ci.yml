name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: yingmo_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s --health-timeout=5s --health-retries=10
    env:
      APP_ENV: testing
      DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/yingmo_ci?charset=utf8mb4
      TEST_DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/yingmo_test?charset=utf8mb4
      JWT_SECRET_KEY: ci-only-jwt-secret-not-for-production-000000000000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -r requirements.lock.txt
        working-directory: backend
      - run: flask --app 'app:create_app("testing")' db upgrade
        working-directory: backend
      - run: python -m pytest
        working-directory: backend
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
